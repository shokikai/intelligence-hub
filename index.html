<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence Hub | 飲食業界情報ダッシュボード</title>
<style>
  :root {
    --primary: #1a3a5c;
    --accent: #e85d2f;
    --accent2: #2e86ab;
    --bg: #f4f6f9;
    --card: #ffffff;
    --border: #dde2ea;
    --text: #2c3e50;
    --text-light: #6b7c93;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

  /* ===== HEADER ===== */
  .header { background: linear-gradient(135deg, var(--primary) 0%, #2a5298 100%); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .header-left h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  .header-left p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .date-display { font-size: 13px; opacity: 0.9; }
  .date-display strong { font-size: 18px; display: block; margin-top: 2px; }
  .refresh-btn { padding: 5px 12px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: white; font-size: 12px; cursor: pointer; transition: background 0.2s; }
  .refresh-btn:hover { background: rgba(255,255,255,0.25); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== CONTAINER ===== */
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

  /* ===== LOADING ===== */
  .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; color: var(--text-light); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-text { font-size: 13px; color: var(--text-light); }

  /* ===== SPOTLIGHT ===== */
  .spotlight { background: var(--card); border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; box-shadow: var(--shadow); border-left: 4px solid var(--accent); }
  .spotlight-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .spotlight-header h2 { font-size: 16px; font-weight: 700; color: var(--primary); }
  .spotlight-badge { background: var(--accent); color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .spotlight-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .spotlight-item { background: var(--bg); border-radius: 8px; padding: 12px 14px; border: 1px solid var(--border); transition: all 0.2s; }
  .spotlight-item:hover { border-color: var(--accent2); box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .spotlight-item .s-cat { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
  .spotlight-item .s-title a { font-size: 13px; font-weight: 600; line-height: 1.4; color: var(--text); text-decoration: none; }
  .spotlight-item .s-title a:hover { color: var(--accent2); text-decoration: underline; }
  .spotlight-item .s-meta { font-size: 11px; color: var(--text-light); margin-top: 5px; }

  /* ===== TABS ===== */
  .tabs-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; margin-bottom: 16px; }
  .tabs-wrapper::-webkit-scrollbar { display: none; }
  .tabs { display: flex; gap: 4px; min-width: max-content; padding-bottom: 2px; }
  .tab-btn { padding: 8px 14px; border: none; background: var(--card); border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-light); transition: all 0.2s; white-space: nowrap; font-weight: 500; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .tab-btn:hover { background: #eef2f7; color: var(--text); }
  .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .tab-btn .tab-icon { margin-right: 5px; }
  .tab-btn .tab-count { display: inline-block; background: rgba(255,255,255,0.25); font-size: 10px; padding: 1px 5px; border-radius: 10px; margin-left: 4px; }
  .tab-btn:not(.active) .tab-count { background: #e8edf3; color: var(--text-light); }

  /* ===== TAB CONTENT ===== */
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .empty-cat { text-align: center; padding: 40px 20px; color: var(--text-light); font-size: 13px; }

  /* ===== NEWS CARD ===== */
  .news-card { background: var(--card); border-radius: 10px; padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: all 0.2s; }
  .news-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 4px; }
  .card-source { font-size: 11px; }
  .card-source-link { color: var(--accent2); text-decoration: none; border-bottom: 1px dashed var(--accent2); }
  .card-source-link:hover { color: #1a6080; border-bottom-style: solid; }
  .card-date { font-size: 11px; color: var(--text-light); }
  .card-title { font-size: 14px; font-weight: 700; line-height: 1.5; margin-bottom: 10px; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent2); text-decoration: underline; }
  .card-actions { display: flex; gap: 8px; }
  .btn-memo { padding: 4px 10px; font-size: 12px; border: 1px solid var(--border); background: var(--card); border-radius: 6px; cursor: pointer; color: var(--text-light); transition: all 0.2s; }
  .btn-memo:hover { border-color: var(--accent2); color: var(--accent2); }
  .memo-input-area { display: none; margin-top: 10px; }
  .memo-input-area textarea { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 13px; resize: vertical; min-height: 60px; font-family: inherit; }
  .memo-input-area textarea:focus { outline: none; border-color: var(--accent2); }
  .memo-save-btn { margin-top: 6px; padding: 5px 14px; background: var(--accent2); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .memo-display { margin-top: 8px; background: #f0f8ff; border-radius: 6px; padding: 8px 10px; font-size: 12px; color: #2a6496; border: 1px solid #c8e6f8; }
  .memo-display .memo-label { font-weight: 700; margin-bottom: 2px; font-size: 11px; }

  /* ===== ERROR NOTICE ===== */
  .fetch-error { background: #fff8f0; border: 1px solid #ffd6b0; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #a05010; margin-bottom: 14px; }

  /* ===== FOOTER ===== */
  .footer { text-align: center; padding: 20px; color: var(--text-light); font-size: 12px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .header-left h1 { font-size: 16px; }
    .container { padding: 12px; }
    .spotlight-grid { grid-template-columns: 1fr; }
    .news-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .header-right { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🏢 Intelligence Hub</h1>
    <p>飲食業界 経営・マーケティング情報ダッシュボード</p>
  </div>
  <div class="header-right">
    <div class="date-display">
      本日の情報収集
      <strong id="currentDate">—</strong>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="startFetch()">🔄 更新</button>
  </div>
</div>

<div class="container">

  <div class="loading-overlay" id="loadingArea">
    <div class="spinner"></div>
    <div class="progress-text" id="progressText">ニュースを取得中...</div>
  </div>

  <div id="mainContent" style="display:none">

    <div class="spotlight">
      <div class="spotlight-header">
        <h2>⭐ 最新トピック</h2>
        <span class="spotlight-badge" id="spotlightBadge">TOP 5</span>
      </div>
      <div class="spotlight-grid" id="spotlightGrid"></div>
    </div>

    <div class="tabs-wrapper">
      <div class="tabs" id="tabBar"></div>
    </div>

    <div id="tabContents"></div>

  </div>

</div>

<div class="footer">Intelligence Hub — Google News RSS リアルタイム取得 | メモはローカルストレージに保存</div>

<script>
// ===== カテゴリ定義 =====
const CATEGORIES = [
  { id: 0, icon: '🍽️', name: '飲食業界ニュース' },
  { id: 1, icon: '🤖', name: 'フードテック' },
  { id: 2, icon: '🛒', name: 'EC・デジタルマーケ' },
  { id: 3, icon: '👥', name: '消費者トレンド' },
  { id: 4, icon: '👷', name: '人材・労務' },
  { id: 5, icon: '📋', name: '規制・行政動向' },
  { id: 6, icon: '🌍', name: '海外成功事例' },
];

// ===== キーワード → カテゴリ マッピング =====
const KEYWORD_SOURCES = [
  { keyword: '飲食業界',           cat: 0, max: 8 },
  { keyword: '外食産業',           cat: 0, max: 6 },
  { keyword: '外食 新業態',        cat: 0, max: 5 },
  { keyword: 'フードテック',       cat: 1, max: 8 },
  { keyword: 'フードデリバリー',   cat: 1, max: 6 },
  { keyword: '飲食店 DX',          cat: 1, max: 5 },
  { keyword: '食品EC',             cat: 2, max: 8 },
  { keyword: '外食トレンド',       cat: 3, max: 6 },
  { keyword: '食品 消費トレンド',  cat: 3, max: 5 },
  { keyword: '飲食店 人手不足',    cat: 4, max: 8 },
  { keyword: '飲食業 補助金',      cat: 5, max: 5 },
  { keyword: '海外 外食 成功',     cat: 6, max: 5 },
];

// CORSプロキシ（Google News RSS はブラウザから直接取得できないため使用）
const CORS_PROXY = 'https://corsproxy.io/?';

// ===== STATE =====
let activeTab = 0;
let NEWS_DATA = [];

// ===== INIT =====
function init() {
  const today = new Date();
  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
  document.getElementById('currentDate').textContent = today.toLocaleDateString('ja-JP', opts);

  const savedMemos = localStorage.getItem('ih_memos');
  window._memos = savedMemos ? JSON.parse(savedMemos) : {};

  startFetch();
}

// ===== RSS 取得 =====
async function startFetch() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '取得中...';

  document.getElementById('loadingArea').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('tabContents').innerHTML = '';

  const progress = document.getElementById('progressText');
  NEWS_DATA = [];
  const seenTitles = new Set();
  let done = 0;

  // 全キーワードを並列取得
  const results = await Promise.allSettled(
    KEYWORD_SOURCES.map(src => fetchRSS(src.keyword, src.cat, src.max))
  );

  for (const result of results) {
    done++;
    progress.textContent = `取得中... ${done} / ${KEYWORD_SOURCES.length} キーワード完了`;

    if (result.status === 'fulfilled') {
      for (const item of result.value) {
        // タイトル先頭25文字で重複除去
        const key = item.title.replace(/\s+/g, '').substring(0, 25);
        if (!seenTitles.has(key)) {
          seenTitles.add(key);
          NEWS_DATA.push(item);
        }
      }
    }
  }

  // 日付の新しい順に並べ替え
  NEWS_DATA.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';

  renderTabs();
  renderSpotlight();
  renderTabContent(0);

  btn.disabled = false;
  btn.textContent = '🔄 更新';
}

/**
 * Google News RSS を CORS プロキシ経由で取得してパースする
 */
async function fetchRSS(keyword, cat, max) {
  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(keyword)}&hl=ja&gl=JP&ceid=JP:ja`;
  const res = await fetch(CORS_PROXY + encodeURIComponent(rssUrl));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const xml = await res.text();

  // DOMParser でXMLをパース
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const items = Array.from(doc.querySelectorAll('item'));

  return items.slice(0, max).map(item => {
    const source = item.querySelector('source')?.textContent?.trim() || '';
    const fullTitle = item.querySelector('title')?.textContent?.trim() || '';
    // タイトル末尾の " - 出典名" を除去
    const title = source
      ? fullTitle.replace(new RegExp(` - ${escReg(source)}$`), '').trim()
      : fullTitle;
    const link = item.querySelector('link')?.nextSibling?.nodeValue?.trim()
               || item.querySelector('guid')?.textContent?.trim()
               || '';
    const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';

    return { cat, title, link, source, pubDate,
             date: formatDate(pubDate), tag: keyword };
  }).filter(item => item.title.length > 0);
}

// ===== TABS =====
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = CATEGORIES.map((c, i) => {
    const count = NEWS_DATA.filter(n => n.cat === i).length;
    return `
      <button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchTab(${i})" id="tabBtn${i}">
        <span class="tab-icon">${c.icon}</span>${c.name}
        ${count > 0 ? `<span class="tab-count">${count}</span>` : ''}
      </button>`;
  }).join('');
}

function switchTab(idx) {
  activeTab = idx;
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
  if (!document.getElementById(`tabContent${idx}`)) renderTabContent(idx);
}

// ===== SPOTLIGHT =====
function renderSpotlight() {
  // 全カテゴリから最新5件を表示
  const top = NEWS_DATA.slice(0, 5);
  const grid = document.getElementById('spotlightGrid');
  if (top.length === 0) {
    grid.innerHTML = '<p style="color:var(--text-light);font-size:13px">取得できませんでした</p>';
    return;
  }
  document.getElementById('spotlightBadge').textContent = `TOP ${top.length}`;
  grid.innerHTML = top.map(n => `
    <div class="spotlight-item">
      <div class="s-cat">${CATEGORIES[n.cat]?.icon ?? ''} ${CATEGORIES[n.cat]?.name ?? ''}</div>
      <div class="s-title"><a href="${escHtml(n.link)}" target="_blank" rel="noopener noreferrer">${escHtml(n.title)}</a></div>
      <div class="s-meta">${escHtml(n.source)} · ${escHtml(n.date)}</div>
    </div>
  `).join('');
}

// ===== TAB CONTENT =====
function renderTabContent(idx) {
  const container = document.getElementById('tabContents');
  if (document.getElementById(`tabContent${idx}`)) return;

  const div = document.createElement('div');
  div.className = `tab-content${idx === activeTab ? ' active' : ''}`;
  div.id = `tabContent${idx}`;

  const items = NEWS_DATA.filter(n => n.cat === idx);
  if (items.length === 0) {
    div.innerHTML = '<div class="empty-cat">このカテゴリのニュースはありません</div>';
  } else {
    div.innerHTML = `<div class="news-grid">${items.map((n, i) => renderCard(n, i, idx)).join('')}</div>`;
  }
  container.appendChild(div);
}

function renderCard(n, i, catIdx) {
  const cardId = `card-${catIdx}-${i}`;
  const memo = window._memos[cardId] || '';

  const sourceHtml = n.source
    ? `<span class="card-source"><a class="card-source-link" href="https://news.google.com/search?q=${encodeURIComponent(n.source)}&hl=ja" target="_blank" rel="noopener noreferrer">${escHtml(n.source)}</a></span>`
    : '';

  return `
    <div class="news-card" id="${cardId}">
      <div class="card-meta">
        ${sourceHtml}
        <span class="card-date">${escHtml(n.date)}</span>
      </div>
      <div class="card-title">
        <a href="${escHtml(n.link)}" target="_blank" rel="noopener noreferrer">${escHtml(n.title)}</a>
      </div>
      ${memo ? `<div class="memo-display"><div class="memo-label">📝 メモ</div>${escHtml(memo)}</div>` : ''}
      <div class="card-actions">
        <button class="btn-memo" onclick="toggleMemo('${cardId}')">📝 メモを${memo ? '編集' : '追加'}</button>
      </div>
      <div class="memo-input-area" id="memoArea-${cardId}">
        <textarea id="memoText-${cardId}" placeholder="メモを入力...">${escHtml(memo)}</textarea>
        <button class="memo-save-btn" onclick="saveMemo('${cardId}', ${catIdx})">保存</button>
      </div>
    </div>`;
}

// ===== MEMO =====
function toggleMemo(cardId) {
  const area = document.getElementById(`memoArea-${cardId}`);
  area.style.display = area.style.display === 'block' ? 'none' : 'block';
}

function saveMemo(cardId, catIdx) {
  const text = document.getElementById(`memoText-${cardId}`).value;
  window._memos[cardId] = text;
  localStorage.setItem('ih_memos', JSON.stringify(window._memos));
  // 該当タブだけ再描画
  const el = document.getElementById(`tabContent${catIdx}`);
  if (el) el.remove();
  renderTabContent(catIdx);
  switchTab(catIdx);
}

// ===== UTIL =====
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

// 正規表現のエスケープ
function escReg(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// pubDate → "YYYY-MM-DD" 形式
function formatDate(pubDate) {
  if (!pubDate) return '';
  try {
    const d = new Date(pubDate);
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
  } catch { return pubDate; }
}

// ===== START =====
init();
</script>
</body>
</html>
